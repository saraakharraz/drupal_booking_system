id: agencies
label: 'Import Agencies'
migration_group: appointment
migration_tags:
  - 'Appointment'

source:
  plugin: csv
  path: 'modules/custom/appointment/data/agencies.csv'
  header_row_count: 1
  delimiter: ','        # optional, safer
  enclosure: '"'        # optional, safer
  ids:
    - id               # <- flat array for CSV plugin

process:
  id: id
  name: name
  address: address
  contact_phone: contact_phone
  contact_email: contact_email
  monday_open: monday_open
  monday_close: monday_close
  tuesday_open: tuesday_open
  tuesday_close: tuesday_close
  wednesday_open: wednesday_open
  wednesday_close: wednesday_close
  thursday_open: thursday_open
  thursday_close: thursday_close
  friday_open: friday_open
  friday_close: friday_close
  saturday_open: saturday_open
  saturday_close: saturday_close
  sunday_open:
    plugin: default_value
    default_value: ''
  sunday_close:
    plugin: default_value
    default_value: ''
  created:
    plugin: default_value
    default_value: '@CURRENT_TIME'
  changed:
    plugin: default_value
    default_value: '@CURRENT_TIME'

destination:
  plugin: 'entity:agency'
